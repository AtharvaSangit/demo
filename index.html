<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
    touch-action: none;
  }

  /* SETUP SCREEN */
  #setup-screen {
    height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(circle, #3a1c1c, #000);
    padding: 20px;
  }

  input {
    padding: 15px;
    width: 80%;
    max-width: 300px;
    font-size: 1.1rem;
    border-radius: 10px;
    border: none;
    margin-bottom: 20px;
    text-align: center;
  }

  button {
    padding: 12px 30px;
    font-size: 1rem;
    cursor: pointer;
    background: linear-gradient(45deg, red, orange, yellow);
    color: black;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    transition: 0.3s;
  }

  button:hover { transform: scale(1.1); }

  /* FEED */
    #shorts-feed {
      display: none;
      height: 100dvh;
      width: 100%;
      overflow: hidden; /* ❌ disables scroll */
      position: relative;
    }

    .card {
      position: absolute;
      height: 100dvh;
      width: 100%;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.4s ease, opacity 0.4s ease;
      will-change: transform;
    }

  /* TEXT */
  .text-content {
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 900;
    text-align: center;
    padding: 20px;
    line-height: 1.3;
  }

  .counter {
    position: absolute;
    top: 20px; left: 20px;
    background: rgba(0,0,0,0.5);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.9rem;
    color: yellow;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(1.05); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>

<body>

<div id="setup-screen">
  <h1>Text Shorts</h1>
  <input type="text" id="userInput" placeholder="Enter your message..." maxlength="60">
  <button onclick="startApp()">Start</button>
</div>

<div id="shorts-feed"></div>
<script>
let currentIndex = 0;
let cards = [];
let startY = 0;

function startApp() {
  const text = document.getElementById('userInput').value || "Keep Scrolling 🔥";
  const feed = document.getElementById('shorts-feed');

  const colors = [
    "#ff0000", "#ff4500", "#ff7300",
    "#ffaa00", "#ffd000", "#ffff00"
  ];

  feed.innerHTML = '';

  for (let i = 0; i < 100; i++) {
    const card = document.createElement('div');
    card.className = 'card';

    const color = colors[i % colors.length];
    card.style.background = `linear-gradient(135deg, ${color}, #000)`;

    card.innerHTML = `
      <div class="counter">#${i+1}</div>
      <div class="text-content">${text}</div>
    `;

    // Stack cards
    card.style.transform = `translateY(${i * 100}%)`;

    feed.appendChild(card);
  }

  cards = document.querySelectorAll('.card');

  document.getElementById('setup-screen').style.display = 'none';
  feed.style.display = 'block';
}

/* MOVE CARDS */
function updateCards() {
  cards.forEach((card, i) => {
    card.style.transform = `translateY(${(i - currentIndex) * 100}%)`;
  });
}

/* TOUCH SWIPE */
document.addEventListener('touchstart', (e) => {
  startY = e.touches[0].clientY;
});

document.addEventListener('touchend', (e) => {
  let endY = e.changedTouches[0].clientY;
  let diff = startY - endY;

  if (diff > 50 && currentIndex < cards.length - 1) {
    currentIndex++;
    updateCards();
  } else if (diff < -50 && currentIndex > 0) {
    currentIndex--;
    updateCards();
  }
});

/* DESKTOP SCROLL */
document.addEventListener('wheel', (e) => {
  if (e.deltaY > 0 && currentIndex < cards.length - 1) {
    currentIndex++;
    updateCards();
  } else if (e.deltaY < 0 && currentIndex > 0) {
    currentIndex--;
    updateCards();
  }
});
</script>

</body>
</html>
